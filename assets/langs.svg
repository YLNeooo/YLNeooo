  <!-- Card -->
  <rect width="380" height="205" rx="10" fill="#161b22"/>
  <rect width="380" height="205" rx="10" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="20" y="28"
