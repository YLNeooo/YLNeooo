  <rect x="20" y="158" width="340" height="6" rx="3" fill="#21262d"/>
  <rect x="20" y="158" width="265" height="6" rx="3" fill="url(#javaG)"/>

  <!-- SwiftUI -->
  <circle cx="28" cy="178" r="4" fill="#f97316" opacity="0.9"/>
  <text x="40" y="182" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="12" fill="#e6edf3">SwiftUI</text>
  <text x="360" y="182" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
