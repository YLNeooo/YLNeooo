  <rect x="20" y="98" width="340" height="6" rx="3" fill="#21262d"/>
  <rect x="20" y="98" width="299" height="6" rx="3" fill="url(#cppG)"/>

  <!-- C -->
  <circle cx="28" cy="118" r="4" fill="#7c3aed" opacity="0.9"/>
  <text x="40" y="122" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="12" fill="#e6edf3">C</text>
  <text x="360" y="122" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
