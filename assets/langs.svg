  <rect x="20" y="34" width="32" height="2" rx="1" fill="#8b5cf6"/>

  <!-- Python -->
  <circle cx="28" cy="58" r="4" fill="#3b82f6" opacity="0.9"/>
  <text x="40" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="12" fill="#e6edf3">Python</text>
  <text x="360" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" fill="#484f58" text-anchor="end">95%</text>
  <rect x="20" y="68" width="340" height="6" rx="3" fill="#21262d"/>
  <rect x="20" y="68" width="323" height="6" rx="3" fill="url(#pyG)" clip-path="url(#pyClip)"/>

  <!-- C++ -->
  <circle cx="28" cy="88" r="4" fill="#8b5cf6" opacity="0.9"/>
  <text x="40" y="92" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="12" fill="#e6edf3">C++</text>
  <text x="360" y="92" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
