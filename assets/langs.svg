  <rect x="20" y="128" width="340" height="6" rx="3" fill="#21262d"/>
  <rect x="20" y="128" width="279" height="6" rx="3" fill="url(#cG)"/>

  <!-- Java -->
  <circle cx="28" cy="148" r="4" fill="#f59e0b" opacity="0.9"/>
  <text x="40" y="152" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="12" fill="#e6edf3">Java</text>
  <text x="360" y="152" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
