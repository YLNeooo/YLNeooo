    </linearGradient>
    <linearGradient id="cppG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="cG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="javaG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="swiftG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <clipPath id="pyClip">
      <rect x="20" y="68" width="323" height="6" rx="3"/>
    </clipPath>
    <clipPath id="cppClip">
      <rect x="20" y="98" width="299" height="6" rx="3"/>
    </clipPath>
    <clipPath id="cClip">
      <rect x="20" y="128" width="279" height="6" rx="3"/>
    </clipPath>
    <clipPath id="javaClip">
      <rect x="20" y="158" width="265" height="6" rx="3"/>
