<svg width="800" height="170" viewBox="0 0 800 170" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Warm near-black background with a subtle purple undertone -->
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0b0816"/>
      <stop offset="100%" stop-color="#100e1e"/>
    </linearGradient>

    <!-- Claude-style accent: warm coral → deep purple -->
    <linearGradient id="accentBar" x1="0" y1="0" x2="0" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#da7756"/>
      <stop offset="100%" stop-color="#5436da"/>
    </linearGradient>

    <!-- Soft radial glow behind the decoration -->
    <radialGradient id="glow" cx="690" cy="85" r="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#5436da" stop-opacity="0.12"/>
      <stop offset="60%"  stop-color="#da7756" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#5436da" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="170" rx="12" fill="url(#bg)"/>

  <!-- Soft right-side glow -->
  <rect width="800" height="170" rx="12" fill="url(#glow)"/>

  <!-- Left accent bar (Claude coral → purple) -->
  <rect x="0" y="0" width="4" height="170" rx="2" fill="url(#accentBar)"/>

  <!-- ── Claude-inspired flowing decoration ──────────────────────────── -->
  <!-- Three overlapping ellipses at staggered rotations around a center,
       evoking Claude's abstract circular logo motif. -->
  <g transform="translate(690, 85)" opacity="0.22">
    <!-- Outer ellipse — warm coral tilt -->
    <ellipse cx="0" cy="0" rx="72" ry="46"
             fill="none" stroke="#da7756" stroke-width="1.6"
             transform="rotate(-22)"/>
    <!-- Middle ellipse — transitional violet -->
    <ellipse cx="0" cy="0" rx="52" ry="33"
             fill="none" stroke="#9b6cf6" stroke-width="1.4"
             transform="rotate(12)"/>
    <!-- Inner ellipse — Claude deep purple -->
    <ellipse cx="0" cy="0" rx="32" ry="20"
             fill="none" stroke="#5436da" stroke-width="1.2"
             transform="rotate(-6)"/>
    <!-- Warm core dot -->
    <circle cx="0" cy="0" r="4" fill="#da7756" opacity="0.5"/>
    <!-- Soft inner halo -->
    <circle cx="0" cy="0" r="18" fill="#da7756" fill-opacity="0.04"/>
  </g>

  <!-- Name -->
  <text x="32" y="80"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="56" font-weight="800" fill="#f0f6fc" letter-spacing="-2">Neo</text>

  <!-- Subtitle -->
  <text x="32" y="108"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="14" fill="#8b949e">CS Major @ Georgia Tech  ·  ML/DL Researcher  ·  Competitive Programmer</text>

  <!-- Chip: Georgia Tech -->
  <rect x="32" y="128" width="98" height="22" rx="11"
        fill="#1d4ed8" fill-opacity="0.18"/>
  <rect x="32" y="128" width="98" height="22" rx="11"
        fill="none" stroke="#3b82f6" stroke-width="0.6" stroke-opacity="0.45"/>
  <text x="81" y="143"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" fill="#60a5fa" text-anchor="middle">Georgia Tech</text>

  <!-- Chip: Open to Work -->
  <rect x="138" y="128" width="92" height="22" rx="11"
        fill="#065f46" fill-opacity="0.22"/>
  <rect x="138" y="128" width="92" height="22" rx="11"
        fill="none" stroke="#10b981" stroke-width="0.6" stroke-opacity="0.45"/>
  <text x="184" y="143"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" fill="#34d399" text-anchor="middle">Open to Work</text>
</svg>
