<svg width="380" height="205" viewBox="0 0 380 205" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ptG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <linearGradient id="tfG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>
    <linearGradient id="npG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="skG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
    <linearGradient id="pdG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
  </defs>

  <!-- Card -->
  <rect width="380" height="205" rx="10" fill="#161b22"/>
  <rect width="380" height="205" rx="10" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="20" y="28"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="600" fill="#f0f6fc">ML / AI Stack</text>
  <rect x="20" y="34" width="32" height="2" rx="1" fill="#3b82f6"/>

  <!-- PyTorch -->
  <circle cx="28" cy="58" r="4" fill="#ef4444" opacity="0.9"/>
  <text x="40" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="12" fill="#e6edf3">PyTorch</text>
  <text x="360" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" fill="#484f58" text-anchor="end">92%</text>
  <rect x="20" y="68" width="340" height="6" rx="3" fill="#21262d"/>
  <rect x="20" y="68" width="313" height="6" rx="3" fill="url(#ptG)"/>

  <!-- TensorFlow -->
  <circle cx="28" cy="88" r="4" fill="#f59e0b" opacity="0.9"/>
  <text x="40" y="92" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="12" fill="#e6edf3">TensorFlow</text>
  <text x="360" y="92" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" fill="#484f58" text-anchor="end">85%</text>
  <rect x="20" y="98" width="340" height="6" rx="3" fill="#21262d"/>
  <rect x="20" y="98" width="289" height="6" rx="3" fill="url(#tfG)"/>

  <!-- NumPy -->
  <circle cx="28" cy="118" r="4" fill="#3b82f6" opacity="0.9"/>
  <text x="40" y="122" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="12" fill="#e6edf3">NumPy</text>
  <text x="360" y="122" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" fill="#484f58" text-anchor="end">90%</text>
  <rect x="20" y="128" width="340" height="6" rx="3" fill="#21262d"/>
  <rect x="20" y="128" width="306" height="6" rx="3" fill="url(#npG)"/>

  <!-- Scikit-learn -->
  <circle cx="28" cy="148" r="4" fill="#10b981" opacity="0.9"/>
  <text x="40" y="152" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="12" fill="#e6edf3">Scikit-learn</text>
  <text x="360" y="152" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" fill="#484f58" text-anchor="end">80%</text>
  <rect x="20" y="158" width="340" height="6" rx="3" fill="#21262d"/>
  <rect x="20" y="158" width="272" height="6" rx="3" fill="url(#skG)"/>

  <!-- Pandas -->
  <circle cx="28" cy="178" r="4" fill="#818cf8" opacity="0.9"/>
  <text x="40" y="182" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="12" fill="#e6edf3">Pandas</text>
  <text x="360" y="182" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" fill="#484f58" text-anchor="end">82%</text>
  <rect x="20" y="188" width="340" height="6" rx="3" fill="#21262d"/>
  <rect x="20" y="188" width="279" height="6" rx="3" fill="url(#pdG)"/>
</svg>
